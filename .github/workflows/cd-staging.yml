name: CD — Staging

on:
  push:
    branches: [ master ]

env:
  AWS_REGION: af-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.af-south-1.amazonaws.com
  EKS_CLUSTER: andikisha-staging

jobs:
  push-and-deploy:
    name: Push Images & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build all fat JARs
        run: ./gradlew bootJar --parallel --no-daemon

      - name: Build and push all Docker images
        run: |
          SERVICES=(api-gateway auth-service tenant-service employee-service \
                    payroll-service compliance-service time-attendance-service \
                    leave-service document-service notification-service \
                    integration-hub-service analytics-service audit-service)
          for SERVICE in "${SERVICES[@]}"; do
            IMAGE_TAG="${{ env.ECR_REGISTRY }}/andikisha/${SERVICE}:${{ github.sha }}"
            docker build \
              --build-arg SERVICE_NAME=${SERVICE} \
              -f infrastructure/docker/Dockerfile.service \
              -t ${IMAGE_TAG} .
            docker push ${IMAGE_TAG}
          done

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Deploy with kustomize
        run: |
          TAG=${{ github.sha }}
          REGISTRY=${{ env.ECR_REGISTRY }}/andikisha
          cd infrastructure/k8s
          SERVICES=(api-gateway auth-service tenant-service employee-service \
                    payroll-service compliance-service time-attendance-service \
                    leave-service document-service notification-service \
                    integration-hub-service analytics-service audit-service)
          IMAGES=""
          for SERVICE in "${SERVICES[@]}"; do
            IMAGES="${IMAGES} andikisha/${SERVICE}=${REGISTRY}/${SERVICE}:${TAG}"
          done
          kustomize edit set image ${IMAGES}
          kubectl apply -k .

      - name: Wait for rollout
        run: |
          for SVC in api-gateway auth-service payroll-service employee-service; do
            kubectl rollout status deployment/${SVC} -n andikisha --timeout=5m
          done

      - name: Smoke test
        run: |
          sleep 10
          GATEWAY=$(kubectl get svc api-gateway -n andikisha \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          if [ -n "$GATEWAY" ]; then
            curl -sf --retry 3 --retry-delay 5 http://${GATEWAY}/actuator/health
          else
            echo "LoadBalancer IP not yet assigned — skipping smoke test"
          fi
