name: CI

on:
  push:
    branches: [ master, main, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ master, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build (compile + checkstyle)
        run: ./gradlew classes testClasses checkstyleMain checkstyleTest --parallel --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Test
        run: ./gradlew test --parallel --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4"

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/test/**/*.xml'

      - name: Upload Test Reports on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  frontend:
    name: Frontend — Typecheck & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'
          run_install: false

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r type-check

      - name: Lint
        run: pnpm --filter "./frontend/landing" --filter "./frontend/platform-portal" --filter "./frontend/tenant-portal" run lint

  docker-build:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build-and-test, frontend]
    if: github.event_name == 'push'
    # id-token: write is required for OIDC ECR login on master pushes.
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: af-south-1
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.af-south-1.amazonaws.com
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - tenant-service
          - employee-service
          - payroll-service
          - compliance-service
          - time-attendance-service
          - leave-service
          - document-service
          - notification-service
          - integration-hub-service
          - analytics-service
          - audit-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build fat JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # PREREQUISITE — confirm the 13 ECR repositories exist before this goes live.
      # Run from a machine with AWS access:
      #   aws ecr describe-repositories --region af-south-1 \
      #     --query 'repositories[].repositoryName' --output text
      # Expected repositories (one per service):
      #   andikisha/api-gateway  andikisha/auth-service  andikisha/tenant-service
      #   andikisha/employee-service  andikisha/payroll-service
      #   andikisha/compliance-service  andikisha/time-attendance-service
      #   andikisha/leave-service  andikisha/document-service
      #   andikisha/notification-service  andikisha/integration-hub-service
      #   andikisha/analytics-service  andikisha/audit-service
      # If any repository is missing, create it before merging this branch.
      # The promote-not-rebuild model in cd-staging.yml and the ECR preflight in
      # cd-production.yml both assume all 13 repositories exist.
      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/master'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/master'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare image tags
        id: meta
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "tags=${{ env.ECR_REGISTRY }}/andikisha/${{ matrix.service }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "tags=andikisha/${{ matrix.service }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.service
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: ${{ steps.meta.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
