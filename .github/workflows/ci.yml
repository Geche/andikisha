name: CI

on:
  push:
    branches: [ master, main, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ master, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build (compile + checkstyle)
        run: ./gradlew classes testClasses checkstyleMain checkstyleTest --parallel --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Test
        run: ./gradlew test --parallel --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4"

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/test/**/*.xml'

      - name: Upload Test Reports on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  frontend:
    name: Frontend — Typecheck & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'
          run_install: false

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r type-check

      - name: Lint
        run: pnpm --filter "./frontend/landing" --filter "./frontend/platform-portal" --filter "./frontend/tenant-portal" run lint

  docker-build:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build-and-test, frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - tenant-service
          - employee-service
          - payroll-service
          - compliance-service
          - time-attendance-service
          - leave-service
          - document-service
          - notification-service
          - integration-hub-service
          - analytics-service
          - audit-service
          - recruitment-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build fat JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REGISTRY=ghcr.io/${OWNER}/andikisha
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "tags=${REGISTRY}/${{ matrix.service }}:latest,${REGISTRY}/${{ matrix.service }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${REGISTRY}/${{ matrix.service }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.service
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: ${{ steps.meta.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-frontend:
    name: Docker Build — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: [build-and-test, frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app:
          - tenant-portal
          - platform-portal
          - landing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'
          run_install: false

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REGISTRY=ghcr.io/${OWNER}/andikisha
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "tags=${REGISTRY}/${{ matrix.app }}:latest,${REGISTRY}/${{ matrix.app }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${REGISTRY}/${{ matrix.app }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.frontend
          build-args: FRONTEND_NAME=${{ matrix.app }}
          push: ${{ steps.meta.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-dokploy:
    name: Trigger Dokploy Deploy
    runs-on: ubuntu-latest
    needs: [docker-build, docker-frontend]
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Trigger redeploy via Dokploy webhook
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DOKPLOY_WEBHOOK_URL" ]; then
            echo "DOKPLOY_WEBHOOK_URL secret not set — skipping redeploy trigger"
            exit 0
          fi
          # Send the webhook URL exactly as Dokploy issues it. The previous
          # http->https rewrite here was based on a wrong assumption: Dokploy
          # is served directly on :3000 with no TLS and no redirect, so forcing
          # https failed the handshake on every merge and nothing ever deployed.
          #
          # TODO: deviation - see docs/decisions/2026-07-21-dokploy-webhook-cleartext.md
          # This posts the deploy token over plain HTTP. Accepted short-term to
          # unblock deploys; fix is to give Dokploy a domain + real certificate.
          echo "Triggering Dokploy redeploy via webhook..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --post301 --post302 -X POST "$DOKPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"ref":"refs/heads/master"}')
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Dokploy webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Verify deploy health
        env:
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
        run: |
          if [ -z "$API_DOMAIN" ]; then
            echo "API_DOMAIN secret not set — skipping health verification"
            exit 0
          fi
          echo "Waiting 90s for Dokploy to pull and restart containers..."
          sleep 90
          echo "Polling https://${API_DOMAIN}/actuator/health..."
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                     "https://${API_DOMAIN}/actuator/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Deploy healthy (attempt $i/20)"
              exit 0
            fi
            echo "Attempt $i/20: HTTP $STATUS — waiting 15s..."
            sleep 15
          done
          echo "ERROR: api-gateway did not return 200 after 20 attempts" && exit 1
