name: CD — Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Git SHA of the staging image to promote'
        required: true
      confirm:
        description: 'Type DEPLOY to confirm'
        required: true

env:
  AWS_REGION: af-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.af-south-1.amazonaws.com
  EKS_CLUSTER: andikisha-production

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    if: github.event.inputs.confirm == 'DEPLOY'
    permissions:
      id-token: write
      contents: write   # required for the bot commit that records the deployed tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Verify images exist in ECR
        env:
          TAG: ${{ github.event.inputs.image_tag }}
        run: |
          # Fail fast before touching the cluster if any image is missing.
          # A typo in image_tag would otherwise only surface as ImagePullBackOff
          # minutes after kubectl apply has already replaced the running pods.
          SERVICES=(api-gateway auth-service tenant-service employee-service \
                    payroll-service compliance-service time-attendance-service \
                    leave-service document-service notification-service \
                    integration-hub-service analytics-service audit-service)
          MISSING=0
          for SERVICE in "${SERVICES[@]}"; do
            echo -n "Checking andikisha/${SERVICE}:${TAG} ... "
            if aws ecr describe-images \
                --region ${{ env.AWS_REGION }} \
                --repository-name "andikisha/${SERVICE}" \
                --image-ids imageTag="${TAG}" \
                --query 'imageDetails[0].imageDigest' \
                --output text 2>/dev/null | grep -q '^sha256:'; then
              echo "OK"
            else
              echo "MISSING"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING image(s) not found in ECR for tag ${TAG}."
            echo "Confirm the tag was pushed by CI before retrying this workflow."
            exit 1
          fi
          echo "All images verified in ECR."

      - name: Deploy to production
        run: |
          TAG=${{ github.event.inputs.image_tag }}
          REGISTRY=${{ env.ECR_REGISTRY }}/andikisha
          cd infrastructure/k8s
          SERVICES=(api-gateway auth-service tenant-service employee-service \
                    payroll-service compliance-service time-attendance-service \
                    leave-service document-service notification-service \
                    integration-hub-service analytics-service audit-service)
          IMAGES=""
          for SERVICE in "${SERVICES[@]}"; do
            IMAGES="${IMAGES} andikisha/${SERVICE}=${REGISTRY}/${SERVICE}:${TAG}"
          done
          kustomize edit set image ${IMAGES}
          kubectl apply -k .

      - name: Monitor rollout
        run: |
          for SVC in api-gateway auth-service tenant-service employee-service \
                     payroll-service compliance-service time-attendance-service \
                     leave-service document-service notification-service \
                     integration-hub-service analytics-service audit-service; do
            kubectl rollout status deployment/${SVC} -n andikisha --timeout=10m
          done

      - name: Commit image tags to git
        env:
          TAG: ${{ github.event.inputs.image_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Production checks out master HEAD by default (no ref: override), so the
          # kustomize edit above already modified the file in this working directory.
          # We just commit that modification.
          git add infrastructure/k8s/kustomization.yaml
          if git diff --cached --quiet; then
            echo "kustomization.yaml already reflects this deployment — nothing to commit."
          else
            # [skip ci] prevents CI from triggering on this bot push and thereby
            # prevents staging CD from firing via the workflow_run event.
            git commit -m "chore(deploy): record production image tags ${TAG:0:7} [skip ci]"
            git push origin HEAD:master
          fi
