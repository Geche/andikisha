<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--bg1)}
  .wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px}
  .lock{border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;height:104px;padding:18px}
  .lock img{max-height:42px;max-width:90%}
  .on-light{background:var(--bg1)}
  .on-ink{background:var(--green-900)}
  .on-amber{background:var(--amber-500)}
  .on-green{background:var(--green-700)}
  .cap{grid-column:1/-1;font-size:12px;color:var(--fg3);margin:-4px 2px 0}
</style></head>
<body>
  <div class="wrap">
    <div class="lock on-light"><img src="../assets/brand/andikisha-full.svg"></div>
    <div class="lock on-ink"><img src="../assets/brand/andikisha-full-white.svg"></div>
    <div class="lock on-green"><img src="../assets/brand/andikisha-type-white.svg"></div>
    <div class="lock on-amber"><img src="../assets/brand/andikisha-full-black.svg"></div>
  </div>
</body></html>
