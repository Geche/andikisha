<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--bg1);padding:20px 24px}
  h3{font-size:13px;margin:0 0 16px;color:var(--fg1);font-weight:600}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:9px}
  .tok{width:60px;font-size:11px;color:var(--fg3);font-family:var(--font-mono);flex:none}
  .bar{height:14px;background:var(--green-200);border-radius:3px}
  .val{font-size:11px;color:var(--fg4);font-family:var(--font-mono)}
</style></head>
<body>
  <h3>Spacing — 4px base scale</h3>
  <div class="row"><span class="tok">space-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
  <div class="row"><span class="tok">space-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="tok">space-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="tok">space-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
  <div class="row"><span class="tok">space-6</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
  <div class="row"><span class="tok">space-8</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
  <div class="row"><span class="tok">space-12</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
  <div class="row"><span class="tok">space-16</span><div class="bar" style="width:64px"></div><span class="val">64px</span></div>
</body></html>
