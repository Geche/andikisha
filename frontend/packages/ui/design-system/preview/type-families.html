<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--bg1);padding:22px 24px;color:var(--fg1)}
  .fam{display:flex;gap:30px;align-items:flex-end;flex-wrap:wrap}
  .blk .big{font-size:32px;font-weight:700;letter-spacing:-0.02em;line-height:1;white-space:nowrap}
  .blk .meta{font-size:11px;color:var(--fg3);margin-top:8px;font-family:var(--font-mono)}
  .disp .big{font-family:var(--font-display)}
  .mono .big{font-family:var(--font-mono);font-weight:500}
  .tag{font-size:9px;color:var(--green-600);font-family:var(--font-mono);margin-top:3px}
  .weights{display:flex;gap:18px;margin-top:26px;flex-wrap:wrap}
  .weights span{font-size:20px}
  .w label{display:block;font-size:10px;color:var(--fg3);font-family:var(--font-mono);margin-top:2px}
</style></head>
<body>
  <div class="fam">
    <div class="blk"><div class="big">Roboto</div><div class="meta">UI &amp; body · headlines</div><div class="tag">Google Fonts</div></div>
    <div class="blk mono"><div class="big">Roboto Mono</div><div class="meta">Code · figures</div><div class="tag">self-hosted</div></div>
  </div>
  <div class="weights">
    <div class="w"><span style="font-weight:400">Aa</span><label>400 Regular</label></div>
    <div class="w"><span style="font-weight:500">Aa</span><label>500 Medium</label></div>
    <div class="w"><span style="font-weight:700">Aa</span><label>700 Bold</label></div>
    <div class="w"><span style="font-weight:900">Aa</span><label>900 Black</label></div>
  </div>
</body></html>
