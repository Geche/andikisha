<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--bg2);padding:26px 24px}
  h3{font-size:13px;margin:0 0 20px;color:var(--fg1);font-weight:600}
  .grid{display:flex;gap:18px;flex-wrap:wrap}
  .item{text-align:center}
  .box{width:96px;height:60px;background:#fff;border-radius:12px}
  .item .l{font-size:10.5px;color:var(--fg3);font-family:var(--font-mono);margin-top:12px}
</style></head>
<body>
  <h3>Elevation — soft, low-spread shadows</h3>
  <div class="grid">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="l">xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="l">sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="l">md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="l">lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-card)"></div><div class="l">card</div></div>
  </div>
</body></html>
