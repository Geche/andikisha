<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--bg1);padding:22px 24px;color:var(--fg1)}
  .row{display:flex;align-items:baseline;gap:16px;padding:9px 0;border-bottom:1px solid var(--neutral-100)}
  .row:last-child{border:0}
  .name{width:118px;flex:none;font-size:11px;color:var(--fg3);font-family:var(--font-mono)}
  .spec{font-family:var(--font-display);font-weight:600;letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head>
<body>
  <div class="row"><span class="name">display-lg · 48</span><span class="spec" style="font-size:48px">People, paid on time</span></div>
  <div class="row"><span class="name">display-md · 36</span><span class="spec" style="font-size:36px">People, paid on time</span></div>
  <div class="row"><span class="name">display-sm · 30</span><span class="spec" style="font-size:30px">People, paid on time</span></div>
  <div class="row"><span class="name">display-xs · 24</span><span class="spec" style="font-size:24px">People, paid on time</span></div>
</body></html>
