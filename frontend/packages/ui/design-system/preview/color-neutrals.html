<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--bg1);padding:20px}
  .scale{display:grid;grid-template-columns:repeat(12,1fr);gap:6px}
  .sw{height:60px;border-radius:8px;border:1px solid rgba(2,17,12,.08)}
  .lab{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;margin-top:8px}
  .lab span{font-size:9.5px;color:var(--fg3);text-align:center}
  h3{font-size:13px;margin:0 0 14px;color:var(--fg1);font-weight:600}
</style></head>
<body>
  <h3>Neutrals — warm gray · text, surfaces, borders</h3>
  <div class="scale">
    <div class="sw" style="background:var(--white)"></div>
    <div class="sw" style="background:var(--neutral-25)"></div>
    <div class="sw" style="background:var(--neutral-50)"></div>
    <div class="sw" style="background:var(--neutral-100)"></div>
    <div class="sw" style="background:var(--neutral-200)"></div>
    <div class="sw" style="background:var(--neutral-300)"></div>
    <div class="sw" style="background:var(--neutral-400)"></div>
    <div class="sw" style="background:var(--neutral-500)"></div>
    <div class="sw" style="background:var(--neutral-600)"></div>
    <div class="sw" style="background:var(--neutral-700)"></div>
    <div class="sw" style="background:var(--neutral-800)"></div>
    <div class="sw" style="background:var(--neutral-900)"></div>
  </div>
  <div class="lab"><span>white</span><span>25</span><span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span>700</span><span>800</span><span>900</span></div>
</body></html>
