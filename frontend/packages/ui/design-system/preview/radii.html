<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--bg1);padding:20px 24px}
  h3{font-size:13px;margin:0 0 16px;color:var(--fg1);font-weight:600}
  .grid{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
  .item{text-align:center}
  .box{width:74px;height:64px;background:var(--green-50);border:1.5px solid var(--green-600);border-bottom:none}
  .item .l{font-size:10.5px;color:var(--fg3);font-family:var(--font-mono);margin-top:6px}
</style></head>
<body>
  <h3>Corner radii</h3>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:4px 4px 0 0"></div><div class="l">xs · 4</div></div>
    <div class="item"><div class="box" style="border-radius:6px 6px 0 0"></div><div class="l">sm · 6</div></div>
    <div class="item"><div class="box" style="border-radius:8px 8px 0 0"></div><div class="l">md · 8</div></div>
    <div class="item"><div class="box" style="border-radius:12px 12px 0 0"></div><div class="l">lg · 12</div></div>
    <div class="item"><div class="box" style="border-radius:16px 16px 0 0"></div><div class="l">xl · 16</div></div>
    <div class="item"><div class="box" style="border-radius:24px 24px 0 0"></div><div class="l">2xl · 24</div></div>
    <div class="item"><div class="box" style="border-radius:999px 999px 0 0"></div><div class="l">pill</div></div>
  </div>
</body></html>
