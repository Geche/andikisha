<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--bg1);padding:20px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .mk{border:1px solid var(--border);border-radius:var(--radius-lg);width:96px;height:96px;display:flex;align-items:center;justify-content:center}
  .mk img{width:46px;height:46px}
  .on-ink{background:var(--green-900);border-color:var(--green-900)}
  .on-green{background:var(--green-700);border-color:var(--green-700)}
  .on-amber{background:var(--amber-500);border-color:var(--amber-500)}
  .note{font-size:13px;color:var(--fg3);max-width:230px;line-height:1.5}
  .note b{color:var(--fg1);font-weight:600}
</style></head>
<body>
  <div class="mk on-light"><img src="../assets/brand/andikisha-mark.svg"></div>
  <div class="mk on-ink"><img src="../assets/brand/andikisha-mark-white.svg"></div>
  <div class="mk on-green"><img src="../assets/brand/andikisha-mark-white.svg"></div>
  <div class="mk on-amber"><img src="../assets/brand/andikisha-mark.svg"></div>
  <div class="note">The mark is a stylized <b>“a”</b> — a forest-green stroke paired with an amber wedge. Clear space ≥ the wedge width on all sides; never recolor outside the two brand hues.</div>
</body></html>
