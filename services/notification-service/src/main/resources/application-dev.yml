# Dev profile. Infra hosts/ports are env-overridable so the same profile works both
# bare-metal (defaults to localhost) and in Docker (compose injects DB_HOST/RABBITMQ_HOST/…).
# See INFRA-1 (#33). Base application.yml stays env-only (no defaults) for prod fail-fast.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5441}/${DB_NAME:andikisha_notify}
    username: ${DB_USERNAME:andikisha}
    password: ${DB_PASSWORD:changeme}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:andikisha}
    password: ${RABBITMQ_PASSWORD:changeme}
  # MailHog for local development — catches all outbound email without sending.
  # MailHog speaks plain SMTP: no AUTH, no STARTTLS. The base application.yml enables
  # both (for real prod relays), so the dev profile must switch them off or the send
  # fails with "AuthenticationFailedException: no password specified".
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# SMS disabled in dev; api-key provided as empty string to satisfy Spring binding
app:
  portal-url: ${PORTAL_URL:http://localhost:3000}
  notifications:
    sms:
      api-key: ""

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    com.andikisha: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
