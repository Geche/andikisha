# services/notification-service/src/main/resources/application.yml
#
# Base configuration — applies to ALL profiles (dev, prod).
# No secrets. No hardcoded values. Everything sensitive comes
# from environment variables injected at runtime.
#
# The ${VAR_NAME} syntax means: read from environment variable.
# Spring will fail to start if a required variable is missing and
# no fallback is defined — which is intentional for prod safety.
#
# MAIL_HOST / MAIL_USERNAME / MAIL_PASSWORD — no fallback. Provide real
# SMTP credentials in prod; use MailHog (localhost:1025) in dev profile.
# SMS_API_KEY — no fallback. Required if SMS_ENABLED=true.

server:
  port: ${SERVER_PORT:8089}

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# email.from and sms operational defaults are not secrets — kept here.
# sms.api-key has no fallback; Spring fails fast if SMS_ENABLED=true without it.
app:
  notifications:
    email:
      from: ${MAIL_FROM:noreply@andikisha.co.ke}
      from-name: ${MAIL_FROM_NAME:AndikishaHR}
    sms:
      api-key: ${SMS_API_KEY}
      username: ${SMS_USERNAME:sandbox}
      sender-id: ${SMS_SENDER_ID:ANDIKISHA}
      enabled: ${SMS_ENABLED:false}

grpc:
  server:
    port: ${GRPC_PORT:9089}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
