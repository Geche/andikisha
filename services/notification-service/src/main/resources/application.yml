server:
  port: ${SERVER_PORT:8089}

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5440}/${DB_NAME:andikisha_notify}
    username: ${DB_USERNAME:andikisha}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:andikisha}
    password: ${RABBITMQ_PASSWORD:changeme}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

app:
  notifications:
    email:
      from: ${MAIL_FROM:noreply@andikisha.co.ke}
      from-name: ${MAIL_FROM_NAME:AndikishaHR}
    sms:
      api-key: ${SMS_API_KEY:}
      username: ${SMS_USERNAME:sandbox}
      sender-id: ${SMS_SENDER_ID:ANDIKISHA}
      enabled: ${SMS_ENABLED:false}

grpc:
  server:
    port: ${GRPC_PORT:9089}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true