# services/audit-service/src/main/resources/application.yml
#
# Base configuration — applies to ALL profiles (dev, prod).
# No secrets. No hardcoded values. Everything sensitive comes
# from environment variables injected at runtime.
#
# The ${VAR_NAME} syntax means: read from environment variable.
# Spring will fail to start if a required variable is missing and
# no fallback is defined — which is intentional for prod safety.

spring:
  application:
    name: audit-service

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /
    listener:
      simple:
        # audit-service is a high-volume consumer; tune for throughput
        prefetch: 20
        concurrency: 3
        max-concurrency: 10

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      use-big-decimal-for-floats: true
    generator:
      write-bigdecimal-as-plain: true

server:
  port: ${SERVER_PORT:8092}

# audit-service has no gRPC server; it is a pure RabbitMQ event consumer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    com.andikisha.audit: INFO
