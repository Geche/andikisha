# Test profile configuration for tenant-service.
# Overrides all ${...} placeholders from application.yml that have no defaults.
# Used when tests run with @ActiveProfiles("test").
# Note: ${REDIS_HOST:localhost} and ${REDIS_PORT:6379} already have fallback defaults
# in application.yml, but are included here for explicitness.

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: false

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  data:
    redis:
      host: localhost
      port: 6379

management:
  health:
    redis:
      enabled: false
