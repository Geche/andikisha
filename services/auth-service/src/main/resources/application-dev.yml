# services/auth-service/src/main/resources/application-dev.yml
#
# Dev profile — active when Spring profile is set to "dev".
# In IntelliJ: Run Configuration > Active Profiles > dev
#
# This file provides fallback defaults for non-sensitive values
# so the service starts cleanly on a fresh dev machine without
# every variable being set manually.
#
# HOW FALLBACKS WORK:
#   ${DB_HOST:localhost}  → use DB_HOST env var; fall back to "localhost" if not set
#   ${JWT_SECRET}         → NO fallback; service refuses to start if this is missing
#
# RULE: Non-sensitive config (hosts, ports, feature flags) can have fallbacks here.
#       Secrets (JWT_SECRET) must always come from the IntelliJ run config env vars.

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:andikisha_auth}
    username: ${DB_USERNAME:andikisha}
    password: ${DB_PASSWORD:changeme}

  jpa:
    properties:
      hibernate:
        format_sql: true      # Pretty-print SQL in dev logs
    show-sql: true            # Log every SQL statement in dev

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:andikisha}
    password: ${RABBITMQ_PASSWORD:changeme}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT_SECRET has NO fallback — you must set it in the IntelliJ run config.
# If you start the service without it, Spring will throw:
#   IllegalArgumentException: Could not resolve placeholder 'JWT_SECRET'
# That is the correct behaviour. Do not add a fallback here.

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    com.andikisha: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
