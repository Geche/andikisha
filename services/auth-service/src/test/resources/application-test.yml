# Test profile configuration for auth-service.
# Overrides all ${...} placeholders from application.yml that have no defaults.
# Used when tests run with @ActiveProfiles("test").

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: false

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  data:
    redis:
      host: localhost
      port: 6379

# JWT secret must be at least 32 characters for HMAC-SHA256.
app:
  jwt:
    # Base64-encoded 32-byte key: "AndikishaHRTestJwtSecretKey12345"
    secret: QW5kaWtpc2hhSFJUZXN0Snd0U2VjcmV0S2V5MTIzNDU=
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000
