server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: document-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5441}/${DB_NAME:andikisha_document}
    username: ${DB_USERNAME:andikisha}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:andikisha}
    password: ${RABBITMQ_PASSWORD:changeme}
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

app:
  storage:
    base-path: ${STORAGE_BASE_PATH:./document-storage}
  grpc:
    payroll:
      deadline-seconds: ${PAYROLL_GRPC_DEADLINE_SECONDS:10}

grpc:
  server:
    port: ${GRPC_PORT:9088}
  client:
    payroll-service:
      address: dns:///${PAYROLL_SERVICE_HOST:localhost}:${PAYROLL_GRPC_PORT:9084}
      negotiation-type: plaintext

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true