# services/document-service/src/main/resources/application.yml
#
# Base configuration — applies to ALL profiles (dev, prod).
# No secrets. No hardcoded values. Everything sensitive comes
# from environment variables injected at runtime.
#
# The ${VAR_NAME} syntax means: read from environment variable.
# Spring will fail to start if a required variable is missing and
# no fallback is defined — which is intentional for prod safety.

server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: document-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# storage.base-path and grpc deadline are operational config — safe defaults kept here
app:
  storage:
    base-path: ${STORAGE_BASE_PATH:./document-storage}
  grpc:
    payroll:
      deadline-seconds: ${PAYROLL_GRPC_DEADLINE_SECONDS:10}

grpc:
  server:
    port: ${GRPC_PORT:9088}
  client:
    payroll-service:
      address: static://${PAYROLL_SERVICE_HOST}:${PAYROLL_GRPC_PORT:9084}
      negotiation-type: plaintext

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
