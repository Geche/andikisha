# Dev profile. Infra hosts/ports are env-overridable so the same profile works both
# bare-metal (defaults to localhost) and in Docker (compose injects DB_HOST/RABBITMQ_HOST/…).
# See INFRA-1 (#33). Base application.yml stays env-only (no defaults) for prod fail-fast.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:andikisha_employee}
    username: ${DB_USERNAME:andikisha}
    password: ${DB_PASSWORD:changeme}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:andikisha}
    password: ${RABBITMQ_PASSWORD:changeme}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    com.andikisha: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
