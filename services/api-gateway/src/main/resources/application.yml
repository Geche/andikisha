server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - RemoveRequestHeader=X-Internal-Request
        - name: CircuitBreaker
          args:
            name: defaultCircuitBreaker
            fallbackUri: forward:/fallback/default
        - name: RequestRateLimiter
          args:
            redis-rate-limiter:
              replenishRate: 50
              burstCapacity: 100
              requestedTokens: 1
            key-resolver: "#{@userKeyResolver}"
      routes:
        # ── Super Admin routes ──────────────────────────────────────────────
        - id: super-admin-routes
          uri: ${TENANT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/super-admin/**
          filters:
            - AddRequestHeader=X-Internal-Request, true
            - SuperAdminAuthFilter
            - name: CircuitBreaker
              args:
                name: tenantCircuitBreaker
                fallbackUri: forward:/fallback/tenant-service

        # ── Phase 1: Foundation ─────────────────────────────────────────────
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth-service

        - id: tenant-service
          uri: ${TENANT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/tenants/**
          filters:
            - name: CircuitBreaker
              args:
                name: tenantCircuitBreaker
                fallbackUri: forward:/fallback/tenant-service

        - id: tenant-plans
          uri: ${TENANT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/plans/**

        - id: tenant-feature-flags
          uri: ${TENANT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/feature-flags/**

        - id: employee-service
          uri: ${EMPLOYEE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/employees/**, /api/v1/departments/**
          filters:
            - TenantLicenceFilter
            - name: CircuitBreaker
              args:
                name: employeeCircuitBreaker
                fallbackUri: forward:/fallback/employee-service

        # ── Phase 2: Core HR ────────────────────────────────────────────────
        - id: payroll-service
          uri: ${PAYROLL_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/payroll/**
          filters:
            - TenantLicenceFilter
            - PayrollDisbursementLockFilter
            - name: CircuitBreaker
              args:
                name: payrollServiceCB
                fallbackUri: forward:/fallback/payroll-service

        - id: compliance-service
          uri: ${COMPLIANCE_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/compliance/**
          filters:
            - TenantLicenceFilter
            - name: CircuitBreaker
              args:
                name: complianceServiceCB
                fallbackUri: forward:/fallback/compliance-service

        - id: attendance-service
          uri: ${ATTENDANCE_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/attendance/**, /api/v1/shifts/**
          filters:
            - TenantLicenceFilter
            - name: CircuitBreaker
              args:
                name: attendanceServiceCB
                fallbackUri: forward:/fallback/time-attendance-service

        - id: leave-service
          uri: ${LEAVE_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/leave/**
          filters:
            - TenantLicenceFilter
            - name: CircuitBreaker
              args:
                name: leaveServiceCB
                fallbackUri: forward:/fallback/leave-service

        # ── Phase 2 New ─────────────────────────────────────────────────────
        - id: expense-service
          uri: ${EXPENSE_SERVICE_URL:http://localhost:8093}
          predicates:
            - Path=/api/v1/expenses/**
          filters:
            - TenantLicenceFilter
            - name: CircuitBreaker
              args:
                name: expenseServiceCB
                fallbackUri: forward:/fallback/expense-service

        # ── Phase 3: Supporting ─────────────────────────────────────────────
        - id: document-service
          uri: ${DOCUMENT_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/v1/documents/**
          filters:
            - TenantLicenceFilter
            - name: CircuitBreaker
              args:
                name: documentServiceCB
                fallbackUri: forward:/fallback/document-service

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback/notification-service

        - id: integration-hub-service
          uri: ${INTEGRATION_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/api/v1/integrations/**, /api/v1/payments/**, /api/v1/filings/**
          filters:
            - TenantLicenceFilter
            - name: CircuitBreaker
              args:
                name: integrationHubCB
                fallbackUri: forward:/fallback/integration-hub-service

        - id: integration-callbacks
          uri: ${INTEGRATION_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/api/v1/callbacks/**

        # ── Phase 3 New ─────────────────────────────────────────────────────
        - id: recruitment-service
          uri: ${RECRUITMENT_SERVICE_URL:http://localhost:8094}
          predicates:
            - Path=/api/v1/recruitment/**
          filters:
            - TenantLicenceFilter
            - name: CircuitBreaker
              args:
                name: recruitmentServiceCB
                fallbackUri: forward:/fallback/recruitment-service

        - id: performance-service
          uri: ${PERFORMANCE_SERVICE_URL:http://localhost:8095}
          predicates:
            - Path=/api/v1/performance/**
          filters:
            - TenantLicenceFilter
            - name: CircuitBreaker
              args:
                name: performanceServiceCB
                fallbackUri: forward:/fallback/performance-service

        - id: asset-service
          uri: ${ASSET_SERVICE_URL:http://localhost:8096}
          predicates:
            - Path=/api/v1/assets/**
          filters:
            - TenantLicenceFilter
            - name: CircuitBreaker
              args:
                name: assetServiceCB
                fallbackUri: forward:/fallback/asset-service

        # ── Phase 4: Intelligence ────────────────────────────────────────────
        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8091}
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - TenantLicenceFilter
            - name: CircuitBreaker
              args:
                name: analyticsServiceCB
                fallbackUri: forward:/fallback/analytics-service

        - id: audit-service
          uri: ${AUDIT_SERVICE_URL:http://localhost:8092}
          predicates:
            - Path=/api/v1/audit/**
          filters:
            - name: CircuitBreaker
              args:
                name: auditServiceCB
                fallbackUri: forward:/fallback/audit-service

        # ── Downstream Swagger api-docs (aggregated) ────────────────────────
        - id: auth-api-docs
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/services/auth/v3/api-docs/**
          filters:
            - StripPrefix=2

        - id: employee-api-docs
          uri: ${EMPLOYEE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/services/employee/v3/api-docs/**
          filters:
            - StripPrefix=2

        - id: tenant-api-docs
          uri: ${TENANT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/services/tenant/v3/api-docs/**
          filters:
            - StripPrefix=2

        - id: payroll-api-docs
          uri: ${PAYROLL_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/services/payroll/v3/api-docs/**
          filters:
            - StripPrefix=2

        - id: leave-api-docs
          uri: ${LEAVE_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/services/leave/v3/api-docs/**
          filters:
            - StripPrefix=2

        - id: attendance-api-docs
          uri: ${ATTENDANCE_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/services/attendance/v3/api-docs/**
          filters:
            - StripPrefix=2

        - id: compliance-api-docs
          uri: ${COMPLIANCE_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/services/compliance/v3/api-docs/**
          filters:
            - StripPrefix=2

        - id: document-api-docs
          uri: ${DOCUMENT_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/services/document/v3/api-docs/**
          filters:
            - StripPrefix=2

        - id: notification-api-docs
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/services/notification/v3/api-docs/**
          filters:
            - StripPrefix=2

        - id: integration-api-docs
          uri: ${INTEGRATION_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/services/integration/v3/api-docs/**
          filters:
            - StripPrefix=2

        - id: analytics-api-docs
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8091}
          predicates:
            - Path=/services/analytics/v3/api-docs/**
          filters:
            - StripPrefix=2

        - id: audit-api-docs
          uri: ${AUDIT_SERVICE_URL:http://localhost:8092}
          predicates:
            - Path=/services/audit/v3/api-docs/**
          filters:
            - StripPrefix=2

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

app:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003}
  swagger:
    gateway-url: ${GATEWAY_URL:http://localhost:8080}

# Springdoc config for aggregated docs
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: 1. Authentication
        url: /services/auth/v3/api-docs
      - name: 2. Tenants & Plans
        url: /services/tenant/v3/api-docs
      - name: 3. Employees & Departments
        url: /services/employee/v3/api-docs
      - name: 4. Payroll
        url: /services/payroll/v3/api-docs
      - name: 5. Leave Management
        url: /services/leave/v3/api-docs
      - name: 6. Time & Attendance
        url: /services/attendance/v3/api-docs
      - name: 7. Compliance
        url: /services/compliance/v3/api-docs
      - name: 8. Documents
        url: /services/document/v3/api-docs
      - name: 9. Notifications
        url: /services/notification/v3/api-docs
      - name: 10. Integration Hub
        url: /services/integration/v3/api-docs
      - name: 11. Analytics
        url: /services/analytics/v3/api-docs
      - name: 12. Audit
        url: /services/audit/v3/api-docs

# Circuit breakers — default profile for all services.
# Financial profile (payroll, compliance, integration hub) is stricter.
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 80
      financial:
        sliding-window-size: 10
        failure-rate-threshold: 30
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      payrollServiceCB:
        base-config: financial
      complianceServiceCB:
        base-config: financial
      integrationHubCB:
        base-config: financial
  timelimiter:
    configs:
      default:
        timeout-duration: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    gateway:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
