# Dev profile. Infra hosts/ports are env-overridable so the same profile works both
# bare-metal (defaults to localhost) and in Docker (compose injects REDIS_HOST/RABBITMQ_HOST/…).
# See INFRA-1 (#33). Base application.yml stays env-only (no defaults) for prod fail-fast.
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:changeme}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:andikisha}
    password: ${RABBITMQ_PASSWORD:changeme}

# Dev JWT secret — valid base64url, 64 bytes. Never use outside local development.
# Spring resolves ${JWT_SECRET} in application.yml from this property when running locally.
JWT_SECRET: "LFQeKe5sNUFz_GBnTZqscfbO9ci1htVvuJpx_gX6mNJN7THtgO1eWANulE3ILAcP"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    com.andikisha: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
