server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: payroll-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5436}/${DB_NAME:andikisha_payroll}
    username: ${DB_USERNAME:andikisha}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:andikisha}
    password: ${RABBITMQ_PASSWORD:changeme}
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

grpc:
  server:
    port: ${GRPC_PORT:9084}
  client:
    employee-service:
      address: dns:///${EMPLOYEE_SERVICE_HOST:localhost}:${EMPLOYEE_GRPC_PORT:9082}
      negotiation-type: plaintext
      enable-keep-alive: true
      keep-alive-time: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true