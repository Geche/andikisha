# Dev profile. Infra hosts/ports are env-overridable so the same profile works both
# bare-metal (defaults to localhost) and in Docker (compose injects DB_HOST/RABBITMQ_HOST/REDIS_HOST/…).
# See INFRA-1 (#33). Base application.yml stays env-only (no defaults) for prod fail-fast.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5442}/${DB_NAME:andikisha_integration}
    username: ${DB_USERNAME:andikisha}
    password: ${DB_PASSWORD:changeme}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:andikisha}
    password: ${RABBITMQ_PASSWORD:changeme}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:changeme}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# M-Pesa and bank transfer disabled in dev; keys provided as empty strings
# to satisfy Spring binding — they are unused while enabled=false
app:
  mpesa:
    consumer-key: ""
    consumer-secret: ""
  # Dev encryption key — valid base64, 32 bytes. Never use outside local development.
  credential-encryption-key: "Vk+5LHcIhuRBRL8AD42p0hbGIHWyknNthztBWxShh2I="

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    com.andikisha: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
