spring:
  application:
    name: integration-hub-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/andikisha_integration
    username: ${DB_USERNAME:andikisha}
    password: ${DB_PASSWORD:andikisha}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          min-idle: 2

server:
  port: 8090

grpc:
  server:
    port: 9090
    security:
      enabled: false
  # Calls payroll-service to initiate bulk disbursements and employee-service for account details
  client:
    payroll-service:
      address: static://localhost:9084
      negotiation-type: plaintext
    employee-service:
      address: static://localhost:9082
      negotiation-type: plaintext

# M-Pesa Daraja API configuration
app:
  mpesa:
    base-url: ${MPESA_BASE_URL:https://sandbox.safaricom.co.ke}
    consumer-key: ${MPESA_CONSUMER_KEY:}
    consumer-secret: ${MPESA_CONSUMER_SECRET:}
    # B2C bulk payment settings
    b2c:
      initiator-name: ${MPESA_B2C_INITIATOR:}
      security-credential: ${MPESA_B2C_SECURITY_CREDENTIAL:}
      short-code: ${MPESA_B2C_SHORT_CODE:}
      queue-timeout-url: ${MPESA_B2C_QUEUE_TIMEOUT_URL:}
      result-url: ${MPESA_B2C_RESULT_URL:}
    # STK push (Lipa Na M-Pesa Online)
    stk:
      short-code: ${MPESA_STK_SHORT_CODE:}
      passkey: ${MPESA_STK_PASSKEY:}
      callback-url: ${MPESA_STK_CALLBACK_URL:}
  idempotency:
    ttl-seconds: 86400   # 24 hours — keyed in Redis to prevent duplicate disbursements

resilience4j:
  circuitbreaker:
    instances:
      mpesa:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      mpesa:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.andikisha.integration: INFO
    org.springframework.web.client: INFO
