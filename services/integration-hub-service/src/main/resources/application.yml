# services/integration-hub-service/src/main/resources/application.yml
#
# Base configuration — applies to ALL profiles (dev, prod).
# No secrets. No hardcoded values. Everything sensitive comes
# from environment variables injected at runtime.
#
# The ${VAR_NAME} syntax means: read from environment variable.
# Spring will fail to start if a required variable is missing and
# no fallback is defined — which is intentional for prod safety.
#
# MPESA_CONSUMER_KEY / MPESA_CONSUMER_SECRET — no fallback. Required in
# prod when MPESA_ENABLED=true; set to empty string in dev profile.
# CREDENTIAL_ENCRYPTION_KEY — no fallback. This key protects stored
# third-party credentials; it must always be explicitly provided.

server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: integration-hub-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# enabled flags and environment name are operational — safe defaults kept here.
# API keys and encryption key have no fallback.
app:
  mpesa:
    enabled: ${MPESA_ENABLED:false}
    environment: ${MPESA_ENV:sandbox}
    consumer-key: ${MPESA_CONSUMER_KEY}
    consumer-secret: ${MPESA_CONSUMER_SECRET}
  bank-transfer:
    enabled: ${BANK_TRANSFER_ENABLED:false}
    provider: ${BANK_PROVIDER:permalink}
  credential-encryption-key: ${CREDENTIAL_ENCRYPTION_KEY}

grpc:
  server:
    port: ${GRPC_PORT:9090}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

mpesa:
  callback:
    allowed-cidrs: ${MPESA_CALLBACK_ALLOWED_CIDRS:196.201.214.0/24,196.201.216.0/23}
    ip-validation-disabled: ${MPESA_CALLBACK_IP_VALIDATION_DISABLED:false}
