server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: integration-hub-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5442}/${DB_NAME:andikisha_integration}
    username: ${DB_USERNAME:andikisha}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:andikisha}
    password: ${RABBITMQ_PASSWORD:changeme}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

app:
  mpesa:
    enabled: ${MPESA_ENABLED:false}
    environment: ${MPESA_ENV:sandbox}
    consumer-key: ${MPESA_CONSUMER_KEY:}
    consumer-secret: ${MPESA_CONSUMER_SECRET:}
  bank-transfer:
    enabled: ${BANK_TRANSFER_ENABLED:false}
    provider: ${BANK_PROVIDER:pesalink}
  credential-encryption-key: ${CREDENTIAL_ENCRYPTION_KEY:}

grpc:
  server:
    port: ${GRPC_PORT:9090}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
