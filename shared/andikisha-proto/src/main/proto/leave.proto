syntax = "proto3";
package leave;

option java_package = "com.andikisha.proto.leave";
option java_multiple_files = true;

service LeaveService {
  rpc GetLeaveBalance(GetLeaveBalanceRequest) returns (LeaveBalanceResponse);
  rpc GetLeaveBalances(GetLeaveBalancesRequest) returns (LeaveBalancesResponse);
  rpc GetLeaveBalancesBatch(GetLeaveBalancesBatchRequest) returns (GetLeaveBalancesBatchResponse);
}

message GetLeaveBalanceRequest {
  string tenant_id = 1;
  string employee_id = 2;
  string leave_type = 3;
  int32 year = 4;
}

message LeaveBalanceResponse {
  string employee_id = 1;
  string leave_type = 2;
  int32 year = 3;
  string accrued = 4;
  string used = 5;
  string carried_over = 6;
  string available = 7;
}

message GetLeaveBalancesRequest {
  string tenant_id = 1;
  string employee_id = 2;
  int32 year = 3;
}

message LeaveBalancesResponse {
  repeated LeaveBalanceResponse balances = 1;
}

message GetLeaveBalancesBatchRequest {
  string tenant_id             = 1;
  repeated string employee_ids = 2;
  int32 year                   = 3;
}

message EmployeeLeaveBalances {
  string employee_id                     = 1;
  repeated LeaveBalanceResponse balances = 2;
}

message GetLeaveBalancesBatchResponse {
  repeated EmployeeLeaveBalances results = 1;
}