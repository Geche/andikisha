syntax = "proto3";
package compliance;

option java_package = "com.andikisha.proto.compliance";
option java_multiple_files = true;

service ComplianceService {
  rpc GetTaxRates(GetTaxRatesRequest) returns (TaxRatesResponse);
  rpc GetStatutoryRates(GetStatutoryRatesRequest) returns (StatutoryRatesResponse);
}

message GetTaxRatesRequest {
  string tenant_id = 1;
  string country = 2;
  string effective_date = 3;
}

// All monetary and rate fields use string to preserve BigDecimal precision
// across the gRPC boundary. Callers must parse via new BigDecimal(value).
message TaxBracket {
  string lower_bound = 1;
  string upper_bound = 2;
  string rate = 3;
}

message TaxRatesResponse {
  string country = 1;
  repeated TaxBracket brackets = 2;
  string personal_relief = 3;
  string insurance_relief_rate = 4;
  string max_insurance_relief = 5;
}

message GetStatutoryRatesRequest {
  string tenant_id = 1;
  string country = 2;
  string effective_date = 3;
}

message StatutoryRatesResponse {
  string country = 1;
  string nssf_rate = 2;
  string nssf_tier1_limit = 3;
  string nssf_tier2_limit = 4;
  string shif_rate = 5;
  string housing_levy_employee_rate = 6;
  string housing_levy_employer_rate = 7;
  string nita_amount = 8;
}