syntax = "proto3";
package auth;

option java_package = "com.andikisha.proto.auth";
option java_multiple_files = true;

service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
  rpc GetUserByEmployeeId(GetUserByEmployeeIdRequest) returns (UserResponse);
  rpc ValidateUssdSession(ValidateUssdSessionRequest) returns (ValidateUssdSessionResponse);
  rpc ProvisionTenantAdmin(ProvisionTenantAdminRequest) returns (ProvisionTenantAdminResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string tenant_id = 3;
  string role = 4;
  string email = 5;
  string employee_id = 6;
}

message CheckPermissionRequest {
  string user_id = 1;
  string tenant_id = 2;
  string resource = 3;
  string action = 4;
  string scope = 5;
}

message CheckPermissionResponse {
  bool allowed = 1;
}

message GetUserByEmployeeIdRequest {
  string tenant_id = 1;
  string employee_id = 2;
}

message UserResponse {
  string user_id = 1;
  string tenant_id = 2;
  string email = 3;
  string role = 4;
  string employee_id = 5;
  bool is_active = 6;
}

message ValidateUssdSessionRequest {
  string session_token = 1;
  string msisdn = 2;
}

message ValidateUssdSessionResponse {
  bool valid = 1;
  string employee_id = 2;
  string tenant_id = 3;
  string invalidation_reason = 4;
}

message ProvisionTenantAdminRequest {
  string tenant_id          = 1;
  string email              = 2;
  string first_name         = 3;
  string last_name          = 4;
  string phone              = 5;
  string temporary_password = 6;
}

message ProvisionTenantAdminResponse {
  string user_id = 1;
  string email   = 2;
}
