syntax = "proto3";
package tenant;

option java_package = "com.andikisha.proto.tenant";
option java_multiple_files = true;

service TenantService {
  rpc GetTenant(GetTenantRequest) returns (TenantResponse);
  rpc VerifyTenantActive(VerifyTenantRequest) returns (VerifyTenantResponse);
  rpc ValidateTenantLicence(ValidateLicenceRequest) returns (ValidateLicenceResponse);
}

message GetTenantRequest {
  string tenant_id = 1;
}

message TenantResponse {
  string id = 1;
  string name = 2;
  string plan = 3;
  string status = 4;
  string country = 5;
  string currency = 6;
}

message VerifyTenantRequest {
  string tenant_id = 1;
}

message VerifyTenantResponse {
  bool active = 1;
  string plan = 2;
}

message ValidateLicenceRequest {
  string tenant_id = 1;
}

message ValidateLicenceResponse {
  bool access_allowed = 1;
  string licence_status = 2;
  bool writes_allowed = 3;
  string restriction_reason = 4;
  string licence_expiry_date = 5;
}
