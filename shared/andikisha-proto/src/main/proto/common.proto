syntax = "proto3";
package common;

option java_package = "com.andikisha.proto.common";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

// Shared pagination request
message PaginationRequest {
  int32 page = 1;
  int32 size = 2;
  string sort_by = 3;
  string sort_direction = 4;
}

// Shared pagination response metadata
message PaginationMeta {
  int32 page = 1;
  int32 size = 2;
  int64 total_elements = 3;
  int32 total_pages = 4;
}

// Shared money type — amount as string to preserve decimal precision
message MoneyProto {
  string amount = 1;
  string currency = 2;
}

// Generic status response
message StatusResponse {
  bool success = 1;
  string message = 2;
}