syntax = "proto3";
package payroll;

option java_package = "com.andikisha.proto.payroll";
option java_multiple_files = true;

import "common.proto";

service PayrollService {
  rpc GetPayrollRun(GetPayrollRunRequest) returns (PayrollRunResponse);
  rpc GetPaySlip(GetPaySlipRequest) returns (PaySlipResponse);
  rpc GetLatestPaySlip(GetLatestPaySlipRequest) returns (PaySlipResponse);
  rpc GetPaySlips(GetPaySlipsRequest) returns (GetPaySlipsResponse);
}

message GetPayrollRunRequest {
  string tenant_id = 1;
  string payroll_run_id = 2;
}

message PayrollRunResponse {
  string id = 1;
  string tenant_id = 2;
  string period = 3;
  string status = 4;
  int32 employee_count = 5;
  string total_gross = 6;
  string total_net = 7;
  string total_paye = 8;
  string total_nssf = 9;
  string total_shif = 10;
  string total_housing_levy = 11;
  string currency = 12;
}

message GetPaySlipRequest {
  string tenant_id = 1;
  string pay_slip_id = 2;
}

message GetLatestPaySlipRequest {
  string tenant_id = 1;
  string employee_id = 2;
}

message GetPaySlipsRequest {
  string tenant_id = 1;
  string payroll_run_id = 2;
}

message GetPaySlipsResponse {
  repeated PaySlipDetail pay_slips = 1;
}

message PaySlipDetail {
  string employee_id = 1;
  string employee_name = 2;
  string employee_number = 3;
  string payroll_run_id = 4;
  string period = 5;
  string gross_pay = 6;
  string net_pay = 7;
  string basic_pay = 8;
  string housing_allowance = 9;
  string transport_allowance = 10;
  string medical_allowance = 11;
  string other_allowances = 12;
  string paye = 13;
  string nssf = 14;
  string shif = 15;
  string housing_levy = 16;
  string helb = 17;
  string personal_relief = 18;
  string insurance_relief = 19;
}

message PaySlipResponse {
  string id = 1;
  string payroll_run_id = 2;
  string tenant_id = 3;
  string employee_id = 4;
  string employee_name = 5;
  string period = 6;
  string gross_pay = 7;
  string taxable_income = 8;
  string basic_pay = 9;
  string housing_allowance = 10;
  string other_allowances = 11;
  string personal_relief = 12;
  string insurance_relief = 13;
  string paye = 14;
  string kra_pin = 15;
  string employee_nssf = 16;
  string employer_nssf = 17;
  string nssf_tier1 = 18;
  string nssf_tier2 = 19;
  string shif = 20;
  string housing_levy = 21;
  string helb = 22;
  string loan_deductions = 23;
  string other_deductions = 24;
  string total_deductions = 25;
  string net_pay = 26;
  string currency = 27;
  string payment_status = 28;
  string mpesa_receipt = 29;
  string bank_name = 30;
  string bank_account = 31;
  string bank_transaction_id = 32;
  string payment_method = 33;
  string payment_date = 34;
  string payment_reference = 35;
  string created_at = 36;
  string approver_id = 37;
  string approver_name = 38;
  string remarks = 39;
}