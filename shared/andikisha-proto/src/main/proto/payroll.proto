syntax = "proto3";
package payroll;

option java_package = "com.andikisha.proto.payroll";
option java_multiple_files = true;

import "common.proto";

service PayrollService {
  rpc GetPayrollRun(GetPayrollRunRequest) returns (PayrollRunResponse);
  rpc GetPaySlip(GetPaySlipRequest) returns (PaySlipResponse);
  rpc GetLatestPaySlip(GetLatestPaySlipRequest) returns (PaySlipResponse);
}

message GetPayrollRunRequest {
  string tenant_id = 1;
  string payroll_run_id = 2;
}

message PayrollRunResponse {
  string id = 1;
  string tenant_id = 2;
  string period = 3;
  string status = 4;
  int32 employee_count = 5;
  double total_gross = 6;
  double total_net = 7;
  double total_paye = 8;
  double total_nssf = 9;
  double total_shif = 10;
  double total_housing_levy = 11;
  string currency = 12;
}

message GetPaySlipRequest {
  string tenant_id = 1;
  string pay_slip_id = 2;
}

message GetLatestPaySlipRequest {
  string tenant_id = 1;
  string employee_id = 2;
}

message PaySlipResponse {
  string id = 1;
  string payroll_run_id = 2;
  string tenant_id = 3;
  string employee_id = 4;
  string employee_name = 5;
  string period = 6;
  double gross_pay = 7;
  double taxable_income = 8;
  double basic_pay = 9;
  double housing_allowance = 10;
  double other_allowances = 11;
  double personal_relief = 12;
  double insurance_relief = 13;
  double paye = 14;
  double kra_pin = 15;
  double employee_nssf = 16;
  double employer_nssf = 17;
  double nssf_tier1 = 18;
  double nssf_tier2 = 19;
  double shif = 20;
  double housing_levy = 21;
  double helb = 22;
  double loan_deductions = 23;
  double other_deductions = 24;
  double total_deductions = 25;
  double net_pay = 26;
  string currency = 27;
  string payment_status = 28;
  string mpesa_receipt = 29;
  string bank_name = 30;
  string bank_account = 31;
  string bank_transaction_id = 32;
  string payment_method = 33;
  string payment_date = 34;
  string payment_reference = 35;
  string created_at = 36;
  string approver_id = 37;
  string approver_name = 38;
  string remarks = 39;
}