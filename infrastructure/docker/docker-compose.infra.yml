  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 4 — Intelligence
  # ═══════════════════════════════════════════════════════════════════════════

  andikisha-analytics:
    image: postgres:16-alpine
    container_name: andikisha-postgres-analytics
    restart: unless-stopped
    environment:
      POSTGRES_DB: andikisha_analytics
      POSTGRES_USER: ${POSTGRES_USER:-andikisha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5443:5432"
    volumes:
      - pg_analytics_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-andikisha} -d andikisha_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  andikisha-audit:
    image: postgres:16-alpine
    container_name: andikisha-postgres-audit
    restart: unless-stopped
    environment:
      POSTGRES_DB: andikisha_audit
      POSTGRES_USER: ${POSTGRES_USER:-andikisha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5444:5432"
    volumes:
      - pg_audit_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-andikisha} -d andikisha_audit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════════════════
  # MESSAGING, CACHE, TRACING
  # ═══════════════════════════════════════════════════════════════════════════

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: andikisha-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI — http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-andikisha}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-changeme}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: andikisha-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  zipkin:
    image: openzipkin/zipkin@sha256:d17e856dcbba7ffeefbbfc252f89ab78a4ab6faed47e646d46daad78f91b5ee2
    container_name: andikisha-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"  # Tracing UI — http://localhost:9411

volumes:
  pg_auth_data:
  pg_employee_data:
  pg_tenant_data:
  pg_payroll_data:
  pg_leave_data:
  pg_compliance_data:
  pg_time_data:
  pg_document_data:
  pg_notify_data:
  pg_integration_data:
  pg_analytics_data:
  pg_audit_data:
  rabbitmq_data:
  redis_data: