# infrastructure/docker/docker-compose.infra.yml
# Place this file at: andikisha-microservices/infrastructure/docker/docker-compose.infra.yml
#
# Start:  docker compose -f infrastructure/docker/docker-compose.infra.yml up -d
# Stop:   docker compose -f infrastructure/docker/docker-compose.infra.yml down
# Reset:  docker compose -f infrastructure/docker/docker-compose.infra.yml down -v
#
# Port map — PostgreSQL instances:
#   andikisha-auth         5433
#   andikisha-employee     5434
#   andikisha-tenant       5435
#   andikisha-payroll      5436
#   andikisha-leave        5437
#   andikisha-compliance   5438
#   andikisha-time         5439
#   andikisha-document     5440
#   andikisha-notify       5441
#   andikisha-integration  5442
#   andikisha-analytics    5443
#   andikisha-audit        5444
#
# Supporting infrastructure:
#   RabbitMQ AMQP         5672
#   RabbitMQ UI          15672
#   Redis                 6379
#   Zipkin UI             9411

name: andikisha

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 1 — Foundation
  # ═══════════════════════════════════════════════════════════════════════════

  andikisha-auth:
    image: postgres:16-alpine
    container_name: andikisha-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: andikisha_auth
      POSTGRES_USER: ${POSTGRES_USER:-andikisha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5433:5432"
    volumes:
      - pg_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-andikisha} -d andikisha_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  andikisha-employee:
    image: postgres:16-alpine
    container_name: andikisha-postgres-employee
    restart: unless-stopped
    environment:
      POSTGRES_DB: andikisha_employee
      POSTGRES_USER: ${POSTGRES_USER:-andikisha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5434:5432"
    volumes:
      - pg_employee_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-andikisha} -d andikisha_employee"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  andikisha-tenant:
