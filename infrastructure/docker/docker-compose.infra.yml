      POSTGRES_USER: ${POSTGRES_USER:-andikisha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5438:5432"
    volumes:
      - pg_compliance_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-andikisha} -d andikisha_compliance"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  andikisha-time:
    image: postgres:16-alpine
    container_name: andikisha-postgres-time
    restart: unless-stopped
    environment:
      POSTGRES_DB: andikisha_time
      POSTGRES_USER: ${POSTGRES_USER:-andikisha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
