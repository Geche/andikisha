    ports:
      - "5436:5432"
    volumes:
      - pg_payroll_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-andikisha} -d andikisha_payroll"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  andikisha-leave:
    image: postgres:16-alpine
    container_name: andikisha-postgres-leave
