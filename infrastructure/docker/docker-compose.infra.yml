    container_name: andikisha-postgres-document
    restart: unless-stopped
    environment:
      POSTGRES_DB: andikisha_document
      POSTGRES_USER: ${POSTGRES_USER:-andikisha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5440:5432"
    volumes:
      - pg_document_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-andikisha} -d andikisha_document"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  andikisha-notify:
    image: postgres:16-alpine
    container_name: andikisha-postgres-notify
    restart: unless-stopped
    environment:
      POSTGRES_DB: andikisha_notify
      POSTGRES_USER: ${POSTGRES_USER:-andikisha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5441:5432"
    volumes:
      - pg_notify_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-andikisha} -d andikisha_notify"]
