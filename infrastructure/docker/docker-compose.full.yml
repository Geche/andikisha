  notification-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: notification-service
    image: andikisha/notification-service:local
    container_name: andikisha-notification-service
    restart: unless-stopped
    ports:
      - "8089:8089"
      - "9089:9089"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: "8089"
      GRPC_PORT: "9089"
      DB_HOST: andikisha-postgres-notify
      DB_PORT: "5432"
      DB_NAME: andikisha_notify
      DB_USERNAME: ${POSTGRES_USER:-andikisha}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-andikisha}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-changeme}
      # Mail — point at MailHog or a real SMTP relay in dev
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@andikisha.co.ke}
      # SMS — disabled by default in dev; set SMS_ENABLED=true to activate
      SMS_API_KEY: ${SMS_API_KEY:-dev-placeholder}
      SMS_ENABLED: ${SMS_ENABLED:-false}
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      andikisha-notify:
        condition: service_healthy
      rabbitmq:
