      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api-gateway:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: api-gateway
    image: andikisha/api-gateway:local
    container_name: andikisha-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-andikisha}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      # Downstream service URLs — resolved via Docker Compose internal DNS
      AUTH_SERVICE_URL: http://auth-service:8081
      TENANT_SERVICE_URL: http://tenant-service:8083
      EMPLOYEE_SERVICE_URL: http://employee-service:8082
      PAYROLL_SERVICE_URL: http://payroll-service:8084
      COMPLIANCE_SERVICE_URL: http://compliance-service:8085
      ATTENDANCE_SERVICE_URL: http://time-attendance-service:8086
      LEAVE_SERVICE_URL: http://leave-service:8087
      DOCUMENT_SERVICE_URL: http://document-service:8088
      NOTIFICATION_SERVICE_URL: http://notification-service:8089
      INTEGRATION_SERVICE_URL: http://integration-hub-service:8090
      ANALYTICS_SERVICE_URL: http://analytics-service:8091
      AUDIT_SERVICE_URL: http://audit-service:8092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      employee-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

