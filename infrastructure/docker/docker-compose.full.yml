# infrastructure/docker/docker-compose.full.yml
#
# All 13 AndikishaHR application services.
#
# Usage (always paired with the infra compose):
#   cd infrastructure/docker
#   docker compose -f docker-compose.infra.yml -f docker-compose.full.yml up -d
#
# The infra compose provides: postgres instances, rabbitmq, redis, zipkin.
# This file adds the 13 Spring Boot services that consume those resources.
#
# All secrets must be present in a .env file alongside this file.
# See .env.example for required variables.

name: andikisha

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 1 — Foundation
  # ═══════════════════════════════════════════════════════════════════════════

  auth-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: auth-service
    image: andikisha/auth-service:local
    container_name: andikisha-auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: "8081"
      GRPC_PORT: "9081"
      DB_HOST: andikisha-postgres-auth
      DB_PORT: "5432"
      DB_NAME: andikisha_auth
      DB_USERNAME: ${POSTGRES_USER:-andikisha}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-andikisha}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      andikisha-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  tenant-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: tenant-service
    image: andikisha/tenant-service:local
    container_name: andikisha-tenant-service
    restart: unless-stopped
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: "8083"
      GRPC_PORT: "9083"
      DB_HOST: andikisha-postgres-tenant
      DB_PORT: "5432"
      DB_NAME: andikisha_tenant
      DB_USERNAME: ${POSTGRES_USER:-andikisha}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-andikisha}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_GRPC_PORT: "9081"
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      andikisha-tenant:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  employee-service:
