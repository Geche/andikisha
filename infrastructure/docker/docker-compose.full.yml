    container_name: andikisha-integration-hub-service
    restart: unless-stopped
    ports:
      - "8090:8090"
      - "9090:9090"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: "8090"
      GRPC_PORT: "9090"
      DB_HOST: andikisha-postgres-integration
      DB_PORT: "5432"
      DB_NAME: andikisha_integration
      DB_USERNAME: ${POSTGRES_USER:-andikisha}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-andikisha}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      # M-Pesa — disabled by default in dev; no real keys required unless testing
      MPESA_ENABLED: "false"
      MPESA_ENV: ${MPESA_ENV:-sandbox}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-}
      BANK_TRANSFER_ENABLED: "false"
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-changeme-32-char-dev-key-padded}
      MPESA_CALLBACK_IP_VALIDATION_DISABLED: "true"
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      andikisha-integration:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

