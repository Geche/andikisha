apiVersion: v1
kind: Service
metadata:
  name: tenant-service
  namespace: andikisha
  labels:
    app: tenant-service
    app.kubernetes.io/name: tenant-service
    app.kubernetes.io/part-of: andikisha-hr
spec:
  type: ClusterIP
  selector:
    app: tenant-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
      protocol: TCP
    - name: grpc
      port: 9083
      targetPort: 9083
      protocol: TCP
