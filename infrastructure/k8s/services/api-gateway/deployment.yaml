apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: andikisha
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: andikisha-hr
    app.kubernetes.io/version: latest
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: andikisha-hr
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-gateway
          image: andikisha/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SERVER_PORT
              value: "8080"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: andikisha-config
                  key: redis-host
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: redis-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: jwt-secret
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: andikisha-config
                  key: rabbitmq-host
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: rabbitmq-username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: rabbitmq-password
            - name: ZIPKIN_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: andikisha-config
                  key: zipkin-endpoint
            - name: TENANT_SERVICE_URL
              value: "http://tenant-service:8083"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8081"
            - name: EMPLOYEE_SERVICE_URL
              value: "http://employee-service:8082"
            - name: PAYROLL_SERVICE_URL
              value: "http://payroll-service:8084"
            - name: LEAVE_SERVICE_URL
              value: "http://leave-service:8087"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
