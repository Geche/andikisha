# TODO: revisit ceilings once node count is fixed in Terraform.
# Current ceilings (minReplicas: 3, maxReplicas: 5) are conservative because
# the cluster node count is not yet codified in infrastructure-as-code.
# Raise maxReplicas proportionally when the node count is known.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: andikisha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
