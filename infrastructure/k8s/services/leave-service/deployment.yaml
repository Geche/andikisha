apiVersion: apps/v1
kind: Deployment
metadata:
  name: leave-service
  namespace: andikisha
  labels:
    app: leave-service
    app.kubernetes.io/name: leave-service
    app.kubernetes.io/part-of: andikisha-hr
    app.kubernetes.io/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leave-service
  template:
    metadata:
      labels:
        app: leave-service
        app.kubernetes.io/name: leave-service
        app.kubernetes.io/part-of: andikisha-hr
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8087"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: leave-service
          image: andikisha/leave-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8087
              protocol: TCP
            - name: grpc
              containerPort: 9087
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SERVER_PORT
              value: "8087"
            - name: GRPC_PORT
              value: "9087"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: andikisha-config
                  key: leave-db-host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "andikisha_leave"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: leave-db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: leave-db-password
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: andikisha-config
                  key: rabbitmq-host
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: rabbitmq-username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: rabbitmq-password
            - name: ZIPKIN_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: andikisha-config
                  key: zipkin-endpoint
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
