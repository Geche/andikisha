# Release 02 placeholder — service not yet deployed.
# TODO: revisit ceilings once node count is fixed in Terraform.
# Activate by uncommenting - hpa.yaml in kustomization.yaml after deployment.yaml exists.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: recruitment-service-hpa
  namespace: andikisha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: recruitment-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
