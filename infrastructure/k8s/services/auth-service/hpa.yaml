# TODO: revisit ceilings once node count is fixed in Terraform.
# Current ceilings (minReplicas: 3, maxReplicas: 4) are conservative because
# the cluster node count is not yet codified in infrastructure-as-code.
# Raise maxReplicas proportionally when the node count is known.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: andikisha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 3
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
