apiVersion: v1
kind: Service
metadata:
  name: integration-hub-service
  namespace: andikisha
  labels:
    app: integration-hub-service
    app.kubernetes.io/name: integration-hub-service
    app.kubernetes.io/part-of: andikisha-hr
spec:
  type: ClusterIP
  selector:
    app: integration-hub-service
  ports:
    - name: http
      port: 8090
      targetPort: 8090
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
