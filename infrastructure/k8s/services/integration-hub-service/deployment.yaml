apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-hub-service
  namespace: andikisha
  labels:
    app: integration-hub-service
    app.kubernetes.io/name: integration-hub-service
    app.kubernetes.io/part-of: andikisha-hr
    app.kubernetes.io/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: integration-hub-service
  template:
    metadata:
      labels:
        app: integration-hub-service
        app.kubernetes.io/name: integration-hub-service
        app.kubernetes.io/part-of: andikisha-hr
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8090"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: integration-hub-service
          image: andikisha/integration-hub-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SERVER_PORT
              value: "8090"
            - name: GRPC_PORT
              value: "9090"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: andikisha-config
                  key: integration-db-host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "andikisha_integration"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: integration-db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: integration-db-password
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: andikisha-config
                  key: rabbitmq-host
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: rabbitmq-username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: rabbitmq-password
            - name: ZIPKIN_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: andikisha-config
                  key: zipkin-endpoint
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: andikisha-config
                  key: redis-host
            - name: MPESA_CONSUMER_KEY
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: mpesa-consumer-key
            - name: MPESA_CONSUMER_SECRET
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: mpesa-consumer-secret
            - name: MPESA_SECURITY_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: mpesa-security-credential
            - name: CREDENTIAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: andikisha-secrets
                  key: credential-encryption-key
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8090
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
