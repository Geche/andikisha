apiVersion: v1
kind: Service
metadata:
  name: employee-service
  namespace: andikisha
  labels:
    app: employee-service
    app.kubernetes.io/name: employee-service
    app.kubernetes.io/part-of: andikisha-hr
spec:
  type: ClusterIP
  selector:
    app: employee-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP
    - name: grpc
      port: 9082
      targetPort: 9082
      protocol: TCP
