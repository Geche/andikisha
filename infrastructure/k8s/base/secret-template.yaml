# SECRET TEMPLATE - DO NOT COMMIT REAL VALUES
# Copy this file to secret.yaml (gitignored), replace all CHANGE_ME placeholders,
# then apply with: kubectl apply -f secret.yaml
#
# Alternatively, use Sealed Secrets, AWS Secrets Manager external-secrets-operator,
# or Vault Agent Injector for production secret management.
apiVersion: v1
kind: Secret
metadata:
  name: andikisha-secrets
  namespace: andikisha
type: Opaque
stringData:
  # ------------------------------------------------------------------ #
  # JWT
  # ------------------------------------------------------------------ #
  jwt-secret: "CHANGE_ME"

  # ------------------------------------------------------------------ #
  # Redis
  # ------------------------------------------------------------------ #
  redis-password: "CHANGE_ME"

  # ------------------------------------------------------------------ #
  # RabbitMQ
  # ------------------------------------------------------------------ #
  rabbitmq-username: "CHANGE_ME"
  rabbitmq-password: "CHANGE_ME"

  # ------------------------------------------------------------------ #
  # Per-service database credentials
  # ------------------------------------------------------------------ #
  auth-db-username: "CHANGE_ME"
  auth-db-password: "CHANGE_ME"

  tenant-db-username: "CHANGE_ME"
  tenant-db-password: "CHANGE_ME"

  employee-db-username: "CHANGE_ME"
  employee-db-password: "CHANGE_ME"

  payroll-db-username: "CHANGE_ME"
  payroll-db-password: "CHANGE_ME"

  compliance-db-username: "CHANGE_ME"
  compliance-db-password: "CHANGE_ME"

  time-db-username: "CHANGE_ME"
  time-db-password: "CHANGE_ME"

  leave-db-username: "CHANGE_ME"
  leave-db-password: "CHANGE_ME"

  document-db-username: "CHANGE_ME"
  document-db-password: "CHANGE_ME"

  notification-db-username: "CHANGE_ME"
  notification-db-password: "CHANGE_ME"

  integration-db-username: "CHANGE_ME"
  integration-db-password: "CHANGE_ME"

  analytics-db-username: "CHANGE_ME"
  analytics-db-password: "CHANGE_ME"

  audit-db-username: "CHANGE_ME"
  audit-db-password: "CHANGE_ME"

  # ------------------------------------------------------------------ #
  # Integration Hub - M-Pesa / external credentials
  # ------------------------------------------------------------------ #
  mpesa-consumer-key: "CHANGE_ME"
  mpesa-consumer-secret: "CHANGE_ME"
  mpesa-security-credential: "CHANGE_ME"
  credential-encryption-key: "CHANGE_ME"
